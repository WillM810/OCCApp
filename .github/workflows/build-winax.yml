name: Build Winax Binary

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - name: Install and build winax
        run: |
          npm install winax
          # npm install will trigger the compilation using node-gyp on the runner

      - name: Locate and list build artifacts
        run: |
          # Command to list the generated files to ensure they exist
          dir node_modules\winax\build\Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: winax-binary-build
          path: |
            node_modules\winax\build\Release\*.node
